<svg width="100%" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#131c2e;#0d1117" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#131c2e">
        <animate attributeName="stop-color" values="#131c2e;#1b2a45;#131c2e" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#132038;#0d1117" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="50%" stop-color="#8AB4FF" />
      <stop offset="100%" stop-color="#58A6FF" />
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="900" height="220" fill="url(#bgGrad)" rx="14" />

  <circle cx="450" cy="110" r="160" fill="url(#glow)">
    <animate attributeName="r" values="140;170;140" dur="5s" repeatCount="indefinite" />
  </circle>

  <!-- particulas flotantes -->
  <g fill="#58A6FF">
    <circle cx="80" cy="40" r="2.2" opacity="0.7">
      <animate attributeName="cy" values="40;180;40" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="9s" repeatCount="indefinite" />
    </circle>
    <circle cx="150" cy="170" r="1.6" opacity="0.5">
      <animate attributeName="cy" values="170;20;170" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="760" cy="50" r="2" opacity="0.6">
      <animate attributeName="cy" values="50;190;50" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="820" cy="150" r="1.8" opacity="0.5">
      <animate attributeName="cy" values="150;30;150" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="250" cy="30" r="1.4" opacity="0.4">
      <animate attributeName="cx" values="250;270;250" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="650" cy="180" r="2" opacity="0.5">
      <animate attributeName="cx" values="650;620;650" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="450" cy="15" r="1.5" opacity="0.6">
      <animate attributeName="cy" values="15;35;15" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- lineas de circuito decorativas -->
  <g stroke="#2b3a55" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 0 200 L 120 200 L 140 180 L 260 180">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite" />
    </path>
    <path d="M 900 20 L 780 20 L 760 40 L 640 40">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="5s" repeatCount="indefinite" />
    </path>
  </g>

  <text x="450" y="100" font-family="Fira Code, monospace" font-size="42" font-weight="700"
        fill="url(#textGrad)" text-anchor="middle">HieysoN</text>
 
  <text x="450" y="140" font-family="Fira Code, monospace" font-size="16"
        fill="#8b949e" text-anchor="middle">Software Inteligente &amp; Automatizaci&#243;n con IA</text>
</svg>
